# Local development only. Do not use this Compose file as an internet-facing deployment template.
name: careerhub-dev

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env.development
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Django API (HTTP only)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    env_file: .env.development
    environment:
      - DATABASE_URL=postgresql://careerhub:careerhub@postgres:5432/careerhub
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    volumes:
      - .:/app
      - ./media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
